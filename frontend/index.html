<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmiczny Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; color: white; border: 1px solid #333; margin-bottom: 20px; min-height: 450px; }
        #iss-map { height: 350px; border-radius: 5px; }
        .apod-img { max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 5px; }
        #apod-explanation { text-align: justify; font-size: 0.9rem; color: #b0b0b0; line-height: 1.4; }
        .table-dark { font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">🌌 Space Dashboard</h1>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <h3>🛰️ Aktualna pozycja ISS</h3>
                    <div id="iss-map"></div>
                    <p id="iss-coords" class="mt-2 text-muted text-center">Oczekiwanie na dane z orbity...</p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h3>📸 Zdjęcie Dnia NASA</h3>
                    <div id="apod-container" class="text-center">
                        <p class="text-muted">Ładowanie obrazu...</p>
                    </div>
                    <h5 id="apod-title" class="mt-3 text-center text-info"></h5>
                    <div id="apod-explanation" class="mt-2 px-2">
                        </div>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-md-7">
                <div class="card p-3">
                    <h3>☄️ Najbliższe Asteroidy (NEO)</h3>
                    <table class="table table-dark table-striped mt-2">
                        <thead>
                            <tr>
                                <th>Nazwa</th>
                                <th>Max Średnica (m)</th>
                                <th>Odległość (km)</th>
                                <th>Prędkość (km/h)</th>
                                <th>Zagrożenie</th>
                            </tr>
                        </thead>
                        <tbody id="asteroids-table-body">
                            <tr><td colspan="5" class="text-center">Pobieranie danych o obiektach bliskich Ziemi...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-3">
                    <h3>📊 Wykres</h3>
                    <canvas id="asteroidsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        console.log("Strona przygotowana. Struktura tabeli i sekcji APOD gotowa na dane.");
    </script>
</body>
</html>
