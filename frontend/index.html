<!DOCTYPE html>

<html lang="pl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Space Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link
rel="stylesheet"
href="style.css">

</head>


<body>

<div class="container mt-4">

<h1 class="text-center mb-4">

🚀 Space Dashboard

</h1>


<div class="row">

<div class="col-12">

<div class="card">

<h3>

🛰️ ISS LIVE TRACK

</h3>

<div id="iss-map"></div>

<p
id="iss-coords"
class="mt-3">

Loading...

</p>

</div>

</div>

</div>



<div class="row mt-4">

<div class="col-md-6">

<div class="card">

<h3>

📸 NASA APOD

</h3>

<div
id="apod-container">

</div>

</div>

</div>



<div class="col-md-6">

<div class="card">

<h3>

☄️ Asteroids

</h3>

<h5
id="stats">

</h5>

<table
class="table table-dark">

<thead>

<tr>

<th>Name</th>

<th>Diameter</th>

<th>Distance</th>

<th>Velocity</th>

<th>Date</th>

<th>Risk</th>

</tr>

</thead>


<tbody
id="asteroids-table-body">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>



<div class="row mt-4">

<div class="col-md-6">

<div class="card">

<h3>

📊 Velocity

</h3>

<canvas
id="asteroidsChart">

</canvas>

</div>

</div>


<div class="col-md-6">

<div class="card">

<h3>

📈 Distance

</h3>

<canvas
id="distanceChart">

</canvas>

</div>

</div>

</div>


</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js"></script>

</body>

</html>
