services:

  db:
    image: postgres:16

    container_name: space_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: space_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres

      interval: 5s
      timeout: 5s
      retries: 10


  backend:
    build: ./backend

    container_name: space_backend

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy


  ingestion:
    environment:
      NASA_API_KEY: ${NASA_API_KEY}
    build: ./ingestion

    container_name: space_ingestion

    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data: